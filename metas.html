<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Metas do Currículo | Bibline Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons (Premium) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="public/styles.css?v=7">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="logo-area">
                <div class="logo-icon">
                    <img src="assets/bibline-icon.png" alt="Bibline Academy Logo"
                        style="width: 100%; height: 100%; object-fit: contain;" />
                </div>
                <h2>Vision Board</h2>
                <span class="badge">Live Sync</span>
            </div>

            <nav class="menu">
                <a href="index.html">
                    <i class="ph ph-chart-pie-slice icon"></i> Overview Geral
                </a>
                <a href="metas.html" class="active">
                    <i class="ph ph-target icon"></i> Metas (Currículo)
                </a>
                <a href="videos.html">
                    <i class="ph ph-video-camera icon"></i> Videos Pipeline
                </a>
            </nav>

            <div class="sync-status">
                <p>Última Sincronização:</p>
                <div id="last-sync-time" class="time-badge">Aguardando...</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1>Metas e Progresso</h1>
                    <p class="subtitle">Acompanhamento acumulativo por Disciplina, Mês e Ano de Estudo</p>
                </div>
            </header>

            <!-- Cards de Disciplinas -->
            <section class="kpi-grid" id="disciplines-grid">
                <!-- Preenchido via JS -->
            </section>

            <!-- Charts Row -->
            <section class="charts-row">
                <div class="chart-container glass-panel" style="flex: 2;">
                    <h3>Cumprimento de Ensino (Ano a Ano)</h3>
                    <div class="chart-wrapper">
                        <canvas id="metasYearChart"></canvas>
                    </div>
                </div>
                <div class="chart-container glass-panel" style="flex: 1;">
                    <h3>Volume Total (Por Disciplina)</h3>
                    <div class="chart-wrapper">
                        <canvas id="metasSubjectChart"></canvas>
                    </div>
                </div>
            </section>

            <!-- Saúde das Metas — Por Disciplina -->
            <section class="ai-insights-row" style="margin-top: 2rem;">
                <div class="insight-panel glass-panel" style="width: 100%;">
                    <div class="panel-header">
                        <i class="ph ph-book-open-text icon"></i>
                        <h3>Saúde das Metas — Por Disciplina</h3>
                    </div>
                    <div id="subject-health-container" class="insight-list"
                        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="public/sidebar.js?v=1"></script>
    <script src="public/metas.js?v=13"></script>
</body>

</html>
