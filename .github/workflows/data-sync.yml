# =============================================================================
# Vision Board Live Sync - OTIMIZADO
# =============================================================================
#
# Arquitetura de Sincronização em Tempo Real
#
# MELHORIAS IMPLEMENTADAS:
# - Cache de node_modules para execução mais rápida
# - Timeout otimizado para GraphQL (300s)
# - Parallel fetching com paginação eficiente
# - Commit atômico com verificação de mudanças
# - Deploy automático para GitHub Pages
#
# TOKEN OBRIGATÓRIO
#   Secret: VISIONBOARDBIBLINE
#   Usuário: Italo-bibline (membro da org bibline)
#   Scopes necessários: repo, project
#
# PROJETO
#   ID: PVT_kwDODLv1ac4BH1XW
#   Nome: "Bibline Aulas"
#   Org: bibline
#
# DASHBOARD
#   URL: https://italogabriel-lab.github.io/Projeto-Editorial-Education/
#   Source: GitHub Pages (branch main, path /)
#
# SLA DE ATUALIZAÇÃO:
# - Trigger: A cada 5 minutos (cron) ou manual
# - Execução: ~2-3 minutos
# - Deploy: ~30 segundos após push
# - Total: ~3-4 minutos para atualização completa
# =============================================================================

name: Vision Board Live Sync

on:
  schedule:
    - cron: '*/5 * * * *'  # A cada 5 minutos
  workflow_dispatch:        # Trigger manual

# Permissões necessárias
permissions:
  contents: write
  actions: read

# Cancelar execuções anteriores se uma nova começar
concurrency:
  group: vision-board-sync
  cancel-in-progress: false

jobs:
  sync_kanban_data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Step 1: Checkout com fetch-depth 1 para ser mais rápido
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Step 2: Setup Node.js com cache otimizado
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Sync Kanban data via GraphQL
      - name: 🔄 Sync Kanban data via GraphQL
        env:
          # PAT do Italo-bibline (org bibline) com scopes repo + project
          PAT_TOKEN: ${{ secrets.VISIONBOARDBIBLINE }}
        run: |
          echo "🚀 Starting Vision Board Sync..."
          echo "⏱️  Start time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          node src/sync.js
          echo "⏱️  End time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      # Step 4: Verify data.json with detailed output
      - name: 📊 Verify data.json
        id: verify
        run: |
          if [ -f "public/data.json" ]; then
            items_count=$(node --input-type=module -e "import fs from 'fs'; const d=JSON.parse(fs.readFileSync('./public/data.json','utf8')); console.log(d.total_items || 0)")
            last_updated=$(node --input-type=module -e "import fs from 'fs'; const d=JSON.parse(fs.readFileSync('./public/data.json','utf8')); console.log(d.last_updated || 'N/A')")
            echo "✅ Total items: $items_count"
            echo "✅ Last updated: $last_updated"
            echo "items_count=$items_count" >> $GITHUB_OUTPUT
            echo "last_updated=$last_updated" >> $GITHUB_OUTPUT
          else
            echo "❌ data.json was NOT created"
            exit 1
          fi

      # Step 5: Commit & Push with atomic operation
      - name: 💾 Commit & Push data.json
        env:
          ITEMS_COUNT: ${{ steps.verify.outputs.items_count }}
          LAST_UPDATED: ${{ steps.verify.outputs.last_updated }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Vision Board Bot"
          git add public/data.json
          
          if git diff --cached --quiet; then
            echo "⚠️  No changes detected, skipping commit"
            echo "📊 Data unchanged from last sync"
          else
            echo "📝 Committing changes..."
            git commit -m "data: sync Kanban - ${ITEMS_COUNT} items (auto-sync)"
            
            echo "🚀 Pushing to main..."
            git push origin main
            
            echo "✅ Sync completed successfully!"
            echo "📊 Items: ${ITEMS_COUNT}"
            echo "🕐 Updated: ${LAST_UPDATED}"
          fi

      # Step 6: Summary
      - name: 📋 Sync Summary
        if: always()
        run: |
          echo "## Vision Board Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Items | ${{ steps.verify.outputs.items_count || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Updated | ${{ steps.verify.outputs.last_updated || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ~2-3 min |" >> $GITHUB_STEP_SUMMARY
