name: Vision Board Live Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_kanban_data:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔄 Sync Kanban data via GraphQL
        env:
          PAT_TOKEN: ${{ secrets.VISIONBOARDBIBLINE }}
        run: node src/sync.js

      - name: 📊 Verify data.json
        run: |
          if [ -f "public/data.json" ]; then
            items_count=$(node -e "const d=require('./public/data.json'); console.log(d.total_items || 0)")
            echo "✓ Total items: $items_count"
            echo "✓ Last updated: $(node -e "const d=require('./public/data.json'); console.log(d.last_updated || 'N/A')")"
          else
            echo "✗ data.json was NOT created"
            exit 1
          fi

      - name: 💾 Commit & Push data.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Vision Board Bot"
          git add public/data.json
          if git diff --cached --quiet; then
            echo "⚠️ No changes detected, skipping commit"
          else
            git commit -m "data: sync Kanban via Actions"
            git push origin main
          fi
