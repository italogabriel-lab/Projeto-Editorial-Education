<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Metas por Disciplina | Bibline Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons (Premium) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="public/styles.css?v=8">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="logo-area">
                <div class="logo-icon">
                    <span class="logo-mark">TM</span>
                </div>
                <h2>Vision Board</h2>
                <span class="badge">Live Sync</span>
            </div>

            <nav class="menu">
                <a href="index.html">
                    <i class="ph ph-chart-pie-slice icon"></i> Overview Geral
                </a>
                <a href="metas.html">
                    <i class="ph ph-target icon"></i> Metas (Currículo)
                </a>
                <a href="metas-disciplinas.html" class="active">
                    <i class="ph ph-book-open-text icon"></i> Metas (Disciplinas)
                </a>
                <a href="videos.html">
                    <i class="ph ph-video-camera icon"></i> Videos Pipeline
                </a>
            </nav>

            <div class="sync-status">
                <p>Última Sincronização:</p>
                <div id="last-sync-time" class="time-badge">Aguardando...</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1>Metas por Disciplina</h1>
                    <p class="subtitle">Saúde das Metas e Progresso Detalhado por Disciplina e Ano de Estudo</p>
                </div>
            </header>

            <!-- Filtro por Ano -->
            <section class="year-filter-section" style="margin-bottom: 2rem;">
                <div class="glass-panel" style="padding: 1.25rem;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                        <i class="ph ph-funnel" style="font-size: 1.2rem; color: var(--color-primary-light);"></i>
                        <div>
                            <h3 style="font-size: 0.95rem; font-weight: 600; color: var(--text-primary); margin: 0;">Filtrar por Ano</h3>
                            <p id="year-filter-subtitle" style="font-size: 0.75rem; color: var(--text-muted); margin: 4px 0 0 0;">Mostrando todos os anos combinados</p>
                        </div>
                    </div>
                    <div id="year-filter-buttons" style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <button class="year-filter-btn active" data-year="all" style="transition: all 0.2s;">
                            <i class="ph ph-squares-four"></i> Todos os Anos
                        </button>
                        <button class="year-filter-btn" data-year="1" style="transition: all 0.2s;">
                            <i class="ph ph-1-circle"></i> 1º Ano
                        </button>
                        <button class="year-filter-btn" data-year="2" style="transition: all 0.2s;">
                            <i class="ph ph-2-circle"></i> 2º Ano
                        </button>
                        <button class="year-filter-btn" data-year="3" style="transition: all 0.2s;">
                            <i class="ph ph-3-circle"></i> 3º Ano
                        </button>
                        <button class="year-filter-btn" data-year="4" style="transition: all 0.2s;">
                            <i class="ph ph-4-circle"></i> 4º Ano
                        </button>
                        <button class="year-filter-btn" data-year="5" style="transition: all 0.2s;">
                            <i class="ph ph-5-circle"></i> 5º Ano
                        </button>
                    </div>
                </div>
            </section>

            <!-- Cards de Disciplinas (clicáveis) -->
            <section class="discipline-cards-grid" id="discipline-cards-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px;">
                <!-- Preenchido via JS -->
            </section>

            <!-- Detalhes da Disciplina Selecionada -->
            <section id="discipline-detail-section" style="display: none; margin-top: 2rem;">
                <div class="glass-panel" style="padding: 1.5rem;">
                    <div class="discipline-detail-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-glass);">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <button id="back-to-cards-btn" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 8px; padding: 8px 12px; cursor: pointer; color: var(--text-primary); display: flex; align-items: center; gap: 6px; transition: all 0.2s;">
                                <i class="ph ph-arrow-left"></i> Voltar
                            </button>
                            <div id="discipline-detail-icon" style="width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"></div>
                            <div>
                                <h2 id="discipline-detail-name" style="font-size: 1.4rem; font-weight: 700; color: var(--text-primary); margin: 0;"></h2>
                                <p id="discipline-detail-subtitle" style="font-size: 0.85rem; color: var(--text-muted); margin: 0;"></p>
                            </div>
                        </div>
                        <div id="discipline-detail-progress" style="text-align: right;">
                            <div style="font-size: 2rem; font-weight: 700;" id="discipline-detail-pct"></div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);" id="discipline-detail-count"></div>
                        </div>
                    </div>

                    <!-- Barra de progresso geral -->
                    <div style="margin-bottom: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem;">
                            <span style="color: var(--text-secondary);">Progresso Total</span>
                            <span style="color: var(--text-primary); font-weight: 600;" id="discipline-detail-bar-label"></span>
                        </div>
                        <div style="width: 100%; height: 10px; background: rgba(255,255,255,0.08); border-radius: 5px; overflow: hidden;">
                            <div id="discipline-detail-bar" style="width: 0%; height: 100%; background: var(--color-primary); transition: width 0.4s ease;"></div>
                        </div>
                    </div>

                    <!-- Cards por Ano -->
                    <div id="discipline-year-cards" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
                        <!-- Preenchido via JS -->
                    </div>

                    <!-- Saúde das Metas — Visão Geral por Ano (Detalhe) -->
                    <div id="year-health-detail-section" style="display: none; margin-top: 2rem;">
                        <!-- Preenchido via JS -->
                    </div>

                </div>
            </section>

        </main>
    </div>

    <script src="public/sidebar.js?v=2"></script>
    <script src="public/metas-disciplinas.js?v=3"></script>
</body>

</html>
